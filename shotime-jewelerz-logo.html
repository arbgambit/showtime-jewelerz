<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showtime Jewelerz Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    gap: 60px;
  }
  .variant-label {
    color: #555;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: -40px;
  }
</style>
</head>
<body>

<p class="variant-label">Primary Logo — Dark Background</p>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7E07D"/>
      <stop offset="25%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F2D06B"/>
      <stop offset="75%" style="stop-color:#A8862A"/>
      <stop offset="100%" style="stop-color:#F7E07D"/>
    </linearGradient>

    <!-- Diamond sparkle gradient -->
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#E8F0FE"/>
      <stop offset="60%" style="stop-color:#B8D4F0"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>

    <!-- Chrome gradient for watch -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#888888"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>

    <!-- Gold stroke gradient -->
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F7E07D"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Diamond facet pattern -->
    <linearGradient id="facet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#B8D4F0;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="facet2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0FE;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8AB4E0;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0a"/>

  <!-- Decorative border lines -->
  <line x1="100" y1="60" x2="700" y2="60" stroke="url(#goldStroke)" stroke-width="0.5" opacity="0.6"/>
  <line x1="100" y1="340" x2="700" y2="340" stroke="url(#goldStroke)" stroke-width="0.5" opacity="0.6"/>

  <!-- Small corner diamonds -->
  <polygon points="100,60 104,56 108,60 104,64" fill="url(#gold)" opacity="0.7"/>
  <polygon points="700,60 704,56 708,60 704,64" fill="url(#gold)" opacity="0.7"/>
  <polygon points="100,340 104,336 108,340 104,344" fill="url(#gold)" opacity="0.7"/>
  <polygon points="700,340 704,336 708,340 704,344" fill="url(#gold)" opacity="0.7"/>

  <!-- CENTER DIAMOND ICON -->
  <g transform="translate(400, 130)">
    <!-- Diamond shape - top facets -->
    <polygon points="0,-42 -30,-10 0,-20 30,-10" fill="url(#facet1)" filter="url(#glow)"/>
    <!-- Diamond shape - left facet -->
    <polygon points="-30,-10 0,-20 0,30" fill="url(#facet2)"/>
    <!-- Diamond shape - right facet -->
    <polygon points="30,-10 0,-20 0,30" fill="#E0EEFF" opacity="0.85"/>
    <!-- Diamond outline -->
    <polygon points="0,-42 -30,-10 0,30 30,-10" fill="none" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <!-- Inner facet lines -->
    <line x1="0" y1="-42" x2="0" y2="30" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="white" stroke-width="0.5" opacity="0.3"/>

    <!-- Sparkle effects -->
    <g filter="url(#softGlow)">
      <line x1="-8" y1="-50" x2="8" y2="-50" stroke="white" stroke-width="1.5" opacity="0.9"/>
      <line x1="0" y1="-58" x2="0" y2="-42" stroke="white" stroke-width="1.5" opacity="0.9"/>
      <line x1="-5" y1="-55" x2="5" y2="-45" stroke="white" stroke-width="0.8" opacity="0.6"/>
      <line x1="5" y1="-55" x2="-5" y2="-45" stroke="white" stroke-width="0.8" opacity="0.6"/>
    </g>
    <g filter="url(#softGlow)" transform="translate(35,-18) scale(0.5)">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="1.5" opacity="0.7"/>
    </g>
    <g filter="url(#softGlow)" transform="translate(-35,-18) scale(0.4)">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="1.5" opacity="0.5"/>
    </g>
  </g>

  <!-- Cuban chain link decorations — left side -->
  <g transform="translate(170, 130)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="16" cy="0" rx="10" ry="6" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="32" cy="0" rx="10" ry="6" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  </g>

  <!-- Cuban chain link decorations — right side -->
  <g transform="translate(588, 130)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="16" cy="0" rx="10" ry="6" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="32" cy="0" rx="10" ry="6" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  </g>

  <!-- MAIN TEXT: SHOWTIME -->
  <text x="400" y="225" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="bold" letter-spacing="18" fill="url(#gold)" filter="url(#glow)">
    SHOWTIME
  </text>

  <!-- Thin gold line separator -->
  <line x1="220" y1="245" x2="580" y2="245" stroke="url(#goldStroke)" stroke-width="1" opacity="0.8"/>

  <!-- SECONDARY TEXT: JEWELERZ -->
  <text x="400" y="280" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="32" letter-spacing="22" fill="url(#gold)" opacity="0.9">
    JEWELERZ
  </text>

  <!-- Tagline -->
  <text x="400" y="315" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="5" fill="#888888" text-transform="uppercase">
    DIAMONDS &bull; CUBAN CHAINS &bull; LUXURY TIMEPIECES
  </text>

  <!-- Small watch icon left of tagline area -->
  <g transform="translate(255, 310) scale(0.6)" opacity="0.5">
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-6" stroke="url(#gold)" stroke-width="1"/>
    <line x1="0" y1="0" x2="4" y2="2" stroke="url(#gold)" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="1" fill="url(#gold)"/>
    <!-- Watch band hints -->
    <rect x="-4" y="-16" width="8" height="5" rx="1" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
    <rect x="-4" y="11" width="8" height="5" rx="1" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
  </g>

  <!-- Small watch icon right of tagline area -->
  <g transform="translate(545, 310) scale(0.6)" opacity="0.5">
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-6" stroke="url(#gold)" stroke-width="1"/>
    <line x1="0" y1="0" x2="4" y2="2" stroke="url(#gold)" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="1" fill="url(#gold)"/>
    <rect x="-4" y="-16" width="8" height="5" rx="1" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
    <rect x="-4" y="11" width="8" height="5" rx="1" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
  </g>
</svg>

<br><br>
<p class="variant-label">Light Background Variant</p>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="25%" style="stop-color:#6B4F10"/>
      <stop offset="50%" style="stop-color:#9B7920"/>
      <stop offset="75%" style="stop-color:#5A400C"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="goldStrokeDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4F10"/>
      <stop offset="50%" style="stop-color:#9B7920"/>
      <stop offset="100%" style="stop-color:#6B4F10"/>
    </linearGradient>
    <linearGradient id="diamondDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6FA5"/>
      <stop offset="50%" style="stop-color:#2C4A7C"/>
      <stop offset="100%" style="stop-color:#4A6FA5"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#FAFAFA"/>

  <line x1="100" y1="60" x2="700" y2="60" stroke="url(#goldStrokeDark)" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="340" x2="700" y2="340" stroke="url(#goldStrokeDark)" stroke-width="0.5" opacity="0.4"/>
  <polygon points="100,60 104,56 108,60 104,64" fill="url(#goldDark)" opacity="0.5"/>
  <polygon points="700,60 704,56 708,60 704,64" fill="url(#goldDark)" opacity="0.5"/>
  <polygon points="100,340 104,336 108,340 104,344" fill="url(#goldDark)" opacity="0.5"/>
  <polygon points="700,340 704,336 708,340 704,344" fill="url(#goldDark)" opacity="0.5"/>

  <g transform="translate(400, 130)">
    <polygon points="0,-42 -30,-10 0,-20 30,-10" fill="url(#diamondDark)" opacity="0.6"/>
    <polygon points="-30,-10 0,-20 0,30" fill="#2C4A7C" opacity="0.5"/>
    <polygon points="30,-10 0,-20 0,30" fill="#4A6FA5" opacity="0.4"/>
    <polygon points="0,-42 -30,-10 0,30 30,-10" fill="none" stroke="#2C4A7C" stroke-width="1.2" opacity="0.7"/>
    <line x1="0" y1="-42" x2="0" y2="30" stroke="#2C4A7C" stroke-width="0.5" opacity="0.3"/>
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#2C4A7C" stroke-width="0.5" opacity="0.2"/>
    <g opacity="0.6">
      <line x1="-8" y1="-50" x2="8" y2="-50" stroke="#2C4A7C" stroke-width="1.5"/>
      <line x1="0" y1="-58" x2="0" y2="-42" stroke="#2C4A7C" stroke-width="1.5"/>
    </g>
  </g>

  <g transform="translate(170, 130)" opacity="0.35">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
    <ellipse cx="16" cy="0" rx="10" ry="6" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
    <ellipse cx="32" cy="0" rx="10" ry="6" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
  </g>
  <g transform="translate(588, 130)" opacity="0.35">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
    <ellipse cx="16" cy="0" rx="10" ry="6" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
    <ellipse cx="32" cy="0" rx="10" ry="6" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
  </g>

  <text x="400" y="225" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="bold" letter-spacing="18" fill="url(#goldDark)">
    SHOWTIME
  </text>
  <line x1="220" y1="245" x2="580" y2="245" stroke="url(#goldStrokeDark)" stroke-width="1" opacity="0.6"/>
  <text x="400" y="280" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="32" letter-spacing="22" fill="url(#goldDark)" opacity="0.85">
    JEWELERZ
  </text>
  <text x="400" y="315" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="5" fill="#999999">
    DIAMONDS &bull; CUBAN CHAINS &bull; LUXURY TIMEPIECES
  </text>
</svg>

<br><br>
<p class="variant-label">Icon Only — Social / Favicon</p>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7E07D"/>
      <stop offset="25%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F2D06B"/>
      <stop offset="75%" style="stop-color:#A8862A"/>
      <stop offset="100%" style="stop-color:#F7E07D"/>
    </linearGradient>
    <linearGradient id="facetIcon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#B8D4F0;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="facetIcon2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0FE;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8AB4E0;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glowIcon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="30" fill="#0a0a0a"/>

  <!-- Diamond -->
  <g transform="translate(100, 72)">
    <polygon points="0,-38 -28,-8 0,-18 28,-8" fill="url(#facetIcon1)" filter="url(#glowIcon)"/>
    <polygon points="-28,-8 0,-18 0,28" fill="url(#facetIcon2)"/>
    <polygon points="28,-8 0,-18 0,28" fill="#E0EEFF" opacity="0.85"/>
    <polygon points="0,-38 -28,-8 0,28 28,-8" fill="none" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <line x1="0" y1="-38" x2="0" y2="28" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <line x1="-28" y1="-8" x2="28" y2="-8" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <!-- Sparkle -->
    <g filter="url(#glowIcon)">
      <line x1="-7" y1="-46" x2="7" y2="-46" stroke="white" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="-53" x2="0" y2="-39" stroke="white" stroke-width="1.8" opacity="0.9"/>
    </g>
  </g>

  <!-- S J monogram -->
  <text x="100" y="148" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="30" font-weight="bold" letter-spacing="6" fill="url(#goldIcon)">
    SJ
  </text>

  <!-- Thin line -->
  <line x1="60" y1="156" x2="140" y2="156" stroke="url(#goldIcon)" stroke-width="0.8" opacity="0.6"/>

  <!-- Chain links below -->
  <g transform="translate(76, 172)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="8" ry="4.5" fill="none" stroke="url(#goldIcon)" stroke-width="2"/>
    <ellipse cx="13" cy="0" rx="8" ry="4.5" fill="none" stroke="url(#goldIcon)" stroke-width="2"/>
    <ellipse cx="26" cy="0" rx="8" ry="4.5" fill="none" stroke="url(#goldIcon)" stroke-width="2"/>
    <ellipse cx="39" cy="0" rx="8" ry="4.5" fill="none" stroke="url(#goldIcon)" stroke-width="2"/>
  </g>
</svg>

</body>
</html>
