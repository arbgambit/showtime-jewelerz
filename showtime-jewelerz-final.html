<!-- CREST V1: Refined shield with SJ monogram    -->
<!-- ============================================ -->
<svg viewBox="0 0 800 420" width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E07D"/>
      <stop offset="30%" stop-color="#C9A84C"/>
      <stop offset="60%" stop-color="#F2D06B"/>
      <stop offset="100%" stop-color="#A8862A"/>
    </linearGradient>

      <stop offset="0%" stop-color="#F7E07D"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="c1-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#F7E07D" flood-opacity="0.12" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="d"/>
      <feMerge><feMergeNode in="d"/><feMergeNode in="SourceGraphic"/></feMerge>

  </defs>
  <rect width="800" height="420" fill="#0a0a0a"/>

  <g transform="translate(400,175)">

    <path d="M 0,-120 L 80,-95 L 90,-10 L 65,55 L 0,95 L -65,55 L -90,-10 L -80,-95 Z" fill="none" stroke="url(#c1-gold)" stroke-width="2" filter="url(#c1-glow)"/>

    <!-- Inner shield line -->

    <!-- Diamond at top of shield -->
    <polygon points="0,-105 -6,-95 0,-85 6,-95" fill="url(#c1-gold)" opacity="0.5"/>

    <!-- SJ Monogram -->
    <text x="0" y="18" text-anchor="middle" font-family="'Playfair Display',serif" font-weight="900" font-size="72" fill="url(#c1-gold)" filter="url(#c1-glow)">SJ</text>

    <!-- Horizontal line under monogram -->
    <line x1="-45" y1="30" x2="45" y2="30" stroke="url(#c1-gold)" stroke-width="0.6" opacity="0.4"/>

    <!-- Small diamonds flanking monogram -->

    <polygon points="55,-5 59,0 55,5 51,0" fill="url(#c1-gold)" opacity="0.3"/>

    <!-- Laurel left -->
    <g opacity="0.45">
      <path d="M -75,-30 C -90,-55 -95,-80 -78,-100" fill="none" stroke="url(#c1-gold)" stroke-width="0.8"/>
      <ellipse cx="-84" cy="-50" rx="5" ry="11" transform="rotate(20,-84,-50)" fill="none" stroke="url(#c1-gold)" stroke-width="0.6"/>
      <ellipse cx="-89" cy="-68" rx="4.5" ry="10" transform="rotate(12,-89,-68)" fill="none" stroke="url(#c1-gold)" stroke-width="0.6"/>
      <ellipse cx="-86" cy="-85" rx="4" ry="9" transform="rotate(5,-86,-85)" fill="none" stroke="url(#c1-gold)" stroke-width="0.6"/>
      <!-- Inner leaves -->
      <ellipse cx="-78" cy="-45" rx="4" ry="9" transform="rotate(-15,-78,-45)" fill="none" stroke="url(#c1-gold)" stroke-width="0.4"/>
      <ellipse cx="-82" cy="-62" rx="3.5" ry="8" transform="rotate(-8,-82,-62)" fill="none" stroke="url(#c1-gold)" stroke-width="0.4"/>
    </g>
    <!-- Laurel right -->
    <g opacity="0.45">
      <path d="M 75,-30 C 90,-55 95,-80 78,-100" fill="none" stroke="url(#c1-gold)" stroke-width="0.8"/>
      <ellipse cx="84" cy="-50" rx="5" ry="11" transform="rotate(-20,84,-50)" fill="none" stroke="url(#c1-gold)" stroke-width="0.6"/>
      <ellipse cx="89" cy="-68" rx="4.5" ry="10" transform="rotate(-12,89,-68)" fill="none" stroke="url(#c1-gold)" stroke-width="0.6"/>
      <ellipse cx="86" cy="-85" rx="4" ry="9" transform="rotate(-5,86,-85)" fill="none" stroke="url(#c1-gold)" stroke-width="0.6"/>
      <ellipse cx="78" cy="-45" rx="4" ry="9" transform="rotate(15,78,-45)" fill="none" stroke="url(#c1-gold)" stroke-width="0.4"/>
      <ellipse cx="82" cy="-62" rx="3.5" ry="8" transform="rotate(8,82,-62)" fill="none" stroke="url(#c1-gold)" stroke-width="0.4"/>
    </g>

    <!-- EST -->
    <text x="0" y="58" text-anchor="middle" font-family="'Cormorant Infant',serif" font-weight="300" font-size="10" letter-spacing="4" fill="url(#c1-gold)" opacity="0.4">EST. 2026</text>
  </g>

</svg>
